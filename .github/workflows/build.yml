          - { branch: openwrt-21.02, sdk_tag: openwrt-21.02, arch: mipsel_24kc_24kf }
          - { branch: openwrt-21.02, sdk_tag: openwrt-21.02, arch: mipsel_74kc }
          - { branch: openwrt-21.02, sdk_tag: openwrt-21.02, arch: mipsel_mips32 }
          - { branch: openwrt-21.02, sdk_tag: openwrt-21.02, arch: x86_64 }
          # OpenWrt 22.03
          - { branch: openwrt-22.03, sdk_tag: openwrt-22.03, arch: aarch64_cortex-a53 }
          - { branch: openwrt-22.03, sdk_tag: openwrt-22.03, arch: aarch64_cortex-a72 }
          - { branch: openwrt-22.03, sdk_tag: openwrt-22.03, arch: aarch64_generic }
          - { branch: openwrt-22.03, sdk_tag: openwrt-22.03, arch: arm_arm1176jzf-s_vfp }
          - { branch: openwrt-22.03, sdk_tag: openwrt-22.03, arch: arm_arm926ej-s }
          - { branch: openwrt-22.03, sdk_tag: openwrt-22.03, arch: arm_cortex-a15_neon-vfpv4 }
