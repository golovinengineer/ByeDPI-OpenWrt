          - { branch: openwrt-19.07, sdk_tag: openwrt-19.07, arch: arm_fa526 }
          - { branch: openwrt-19.07, sdk_tag: openwrt-19.07, arch: arm_mpcore }
          - { branch: openwrt-19.07, sdk_tag: openwrt-19.07, arch: arm_xscale }
          - { branch: openwrt-19.07, sdk_tag: openwrt-19.07, arch: mips64_octeonplus }
          - { branch: openwrt-19.07, sdk_tag: openwrt-19.07, arch: mips_24kc }
          - { branch: openwrt-19.07, sdk_tag: openwrt-19.07, arch: mips_mips32 }
