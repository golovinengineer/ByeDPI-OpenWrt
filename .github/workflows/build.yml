          - { branch: openwrt-22.03, sdk_tag: openwrt-22.03, arch: arm_fa526 }
          - { branch: openwrt-22.03, sdk_tag: openwrt-22.03, arch: arm_mpcore }
          - { branch: openwrt-22.03, sdk_tag: openwrt-22.03, arch: arm_xscale }
          - { branch: openwrt-22.03, sdk_tag: openwrt-22.03, arch: mips64_octeonplus }
          - { branch: openwrt-22.03, sdk_tag: openwrt-22.03, arch: mips_24kc }
          - { branch: openwrt-22.03, sdk_tag: openwrt-22.03, arch: mips_4kec }
          - { branch: openwrt-22.03, sdk_tag: openwrt-22.03, arch: mips_mips32 }
          - { branch: openwrt-22.03, sdk_tag: openwrt-22.03, arch: mipsel_24kc }
          - { branch: openwrt-22.03, sdk_tag: openwrt-22.03, arch: mipsel_24kc_24kf }
          - { branch: openwrt-22.03, sdk_tag: openwrt-22.03, arch: mipsel_74kc }
          - { branch: openwrt-22.03, sdk_tag: openwrt-22.03, arch: mipsel_mips32 }
          - { branch: openwrt-22.03, sdk_tag: openwrt-22.03, arch: x86_64 }
          # OpenWrt 23.05
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: aarch64_cortex-a53 }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: aarch64_cortex-a72 }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: aarch64_generic }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: arm_arm1176jzf-s_vfp }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: arm_arm926ej-s }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: arm_cortex-a15_neon-vfpv4 }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: arm_cortex-a5_vfpv4 }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: arm_cortex-a7 }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: arm_cortex-a7_neon-vfpv4 }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: arm_cortex-a7_vfpv4 }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: arm_cortex-a8_vfpv3 }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: arm_cortex-a9 }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: arm_cortex-a9_neon }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: arm_cortex-a9_vfpv3-d16 }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: arm_fa526 }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: arm_mpcore }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: arm_xscale }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: mips64_octeonplus }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: mips_24kc }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: mips_4kec }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: mips_mips32 }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: mipsel_24kc }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: mipsel_24kc_24kf }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: mipsel_74kc }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: mipsel_mips32 }
          - { branch: openwrt-23.05, sdk_tag: openwrt-23.05, arch: x86_64 }
          # OpenWrt 24.10
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: aarch64_cortex-a53 }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: aarch64_cortex-a72 }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: aarch64_cortex-a76 }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: aarch64_generic }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: arm_arm1176jzf-s_vfp }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: arm_arm926ej-s }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: arm_cortex-a15_neon-vfpv4 }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: arm_cortex-a5_vfpv4 }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: arm_cortex-a7 }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: arm_cortex-a7_neon-vfpv4 }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: arm_cortex-a7_vfpv4 }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: arm_cortex-a8_vfpv3 }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: arm_cortex-a9 }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: arm_cortex-a9_neon }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: arm_cortex-a9_vfpv3-d16 }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: arm_fa526 }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: arm_xscale }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: mips64_octeonplus }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: mips_24kc }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: mips_4kec }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: mips_mips32 }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: mipsel_24kc }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: mipsel_24kc_24kf }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: mipsel_74kc }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: mipsel_mips32 }
          - { branch: openwrt-24.10, sdk_tag: openwrt-24.10, arch: x86_64 }
          # OpenWrt 25.12 – sdk image tag: openwrt/sdk:<arch>-25.12.2 (no floating "25.12" tag exists)
          # Excludes: arm_mpcore, arm_fa526, mips_4kec, mips_mips32 (not available in 25.12 SDK)
          - { branch: 25.12, sdk_tag: 25.12.2, arch: aarch64_cortex-a53 }
          - { branch: 25.12, sdk_tag: 25.12.2, arch: aarch64_cortex-a72 }
          - { branch: 25.12, sdk_tag: 25.12.2, arch: aarch64_cortex-a76 }
          - { branch: 25.12, sdk_tag: 25.12.2, arch: arm_arm1176jzf-s_vfp }
          - { branch: 25.12, sdk_tag: 25.12.2, arch: arm_cortex-a7 }
          - { branch: 25.12, sdk_tag: 25.12.2, arch: arm_cortex-a7_vfpv4 }
          - { branch: 25.12, sdk_tag: 25.12.2, arch: arm_cortex-a8_vfpv3 }
          - { branch: 25.12, sdk_tag: 25.12.2, arch: arm_cortex-a9_neon }
          - { branch: 25.12, sdk_tag: 25.12.2, arch: arm_cortex-a9_vfpv3-d16 }
          - { branch: 25.12, sdk_tag: 25.12.2, arch: arm_xscale }
          - { branch: 25.12, sdk_tag: 25.12.2, arch: mips64_octeonplus }
          - { branch: 25.12, sdk_tag: 25.12.2, arch: mips_24kc }
          - { branch: 25.12, sdk_tag: 25.12.2, arch: mipsel_24kc }
          - { branch: 25.12, sdk_tag: 25.12.2, arch: mipsel_24kc_24kf }
          - { branch: 25.12, sdk_tag: 25.12.2, arch: mipsel_74kc }
          - { branch: 25.12, sdk_tag: 25.12.2, arch: mipsel_mips32 }
          - { branch: 25.12, sdk_tag: 25.12.2, arch: x86_64 }
    container:
      image: openwrt/sdk:${{ matrix.arch }}-${{ matrix.sdk_tag }}
      options: --user root
    defaults: { run: { shell: bash } }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SDK
        if: matrix.branch == 'openwrt-23.05' || matrix.branch == 'openwrt-24.10' || matrix.branch == '25.12' || matrix.branch == 'SNAPSHOT'
        working-directory: /builder
        run: HOME=/builder ./setup.sh

      - name: Prepare build
        id: prepare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: 'hufrea/byedpi'
        run : |
          TAG=$(wget -qO- --header="Authorization: token $GH_TOKEN" http://api.github.com/repos/$REPO/releases/latest | grep -Po '"tag_name": "\K.+?(?=")')
          sed "s|@VERSION@|${TAG#v}|" -i byedpi/Makefile
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build package
        id: build
        working-directory: ${{ matrix.branch == 'openwrt-19.07' && '/home/build/openwrt' || '/builder' }}
        env:
          ARCH: ${{ matrix.arch }}
          BRANCH: ${{ matrix.branch }}
          SIGN_KEY: ${{ secrets.SIGN_PRIVATE_KEY }}
        run: |
          echo "src-link byedpi $GITHUB_WORKSPACE" >> feeds.conf
          ./scripts/feeds update byedpi
          ./scripts/feeds install -a -p byedpi
          make defconfig
          make package/byedpi/compile V=s -j$(nproc) BUILD_LOG=1
          echo "$SIGN_KEY" | base64 -d > key-build
          make package/index
          tar -C ./bin/packages/*/byedpi -cvf $GITHUB_WORKSPACE/ipk-$BRANCH-$ARCH.tar --transform "s|^\./|${BRANCH/openwrt-/}/$ARCH/|" --show-transformed-names .

      - name: Compress build logs
        if: always()
        env:
          ARCH: ${{ matrix.arch }}
          BRANCH: ${{ matrix.branch }}
          LOGS_DIR: ${{ matrix.branch == 'openwrt-19.07' && '/home/build/openwrt/logs' || '/builder/logs' }}
        run: |
          tar -cJvf logs-$BRANCH-$ARCH.tar.xz $LOGS_DIR

      - name: Upload packages
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.branch }}-${{ matrix.arch }}
          path: ipk-${{ matrix.branch }}-${{ matrix.arch }}.tar
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.branch }}-${{ matrix.arch }}
          path: logs-*.tar.xz

  gh-pages:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ipk-*

      - name: Prepare files
        run: |
          mkdir public
          find . -name 'ipk-*.tar' -exec tar -C ./public -xvf {} \;
          cat <<EOF >> public/public.key
          untrusted comment: ByeDPI OpenWrt repo
          RWRT/Cfg5ReIbqWME8QTUQ1FKxp8FTr9M9g1vDsL8uIdRyP5TTNAk4QA
          EOF

      - name: Deploy to GH pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          full_commit_message: 'ByeDPI ${{ needs.build.outputs.tag }}'
          force_orphan: true

  release:
    needs: [ build, gh-pages ]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        branch:
          - '19.07'
          - '21.02'
          - '22.03'
          - '23.05'
          - '24.10'
          - '25.12'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ipk-*

      - name: Prepare files
        env:
          BRANCH: ${{ matrix.branch }}
        run: |
          # For 19.07–24.10 the artifact name contains "openwrt-<branch>"; for 25.12 it is just "25.12"
          if [[ "$BRANCH" == "25.12" ]]; then
            find . -name "ipk-${BRANCH}-*.tar" -exec tar -xvf {} --wildcards '*.apk' \;
          else
            find . -name "ipk-openwrt-${BRANCH}-*.tar" -exec tar -xvf {} --wildcards '*.ipk' \;
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          tag_name: ${{ needs.build.outputs.tag }}-${{ matrix.branch }}
          name: ${{ needs.build.outputs.tag }} for OpenWrt ${{ matrix.branch }}
          target_commitish: gh-pages
          body: |
            ### ByeDPI ${{ needs.build.outputs.tag }} for OpenWrt ${{ matrix.branch }}

            -----
            Check the package architecture of your device using the command:
            ```
            # awk -F\' '/DISTRIB_ARCH/ {print $2}' /etc/openwrt_release
            ```
          files: |
            ./**/*.ipk
            ./**/*.apk
