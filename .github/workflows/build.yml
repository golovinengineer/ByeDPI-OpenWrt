          - { branch: openwrt-21.02, sdk_tag: openwrt-21.02, arch: arm_cortex-a7_neon-vfpv4 }
          - { branch: openwrt-21.02, sdk_tag: openwrt-21.02, arch: arm_cortex-a8_vfpv3 }
          - { branch: openwrt-21.02, sdk_tag: openwrt-21.02, arch: arm_cortex-a9 }
          - { branch: openwrt-21.02, sdk_tag: openwrt-21.02, arch: arm_cortex-a9_neon }
          - { branch: openwrt-21.02, sdk_tag: openwrt-21.02, arch: arm_cortex-a9_vfpv3-d16 }
